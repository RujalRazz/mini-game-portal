<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--Stylesheet-->
    <link rel="stylesheet" href="./rock_paper_scissors.css" />
    <link rel="stylesheet" href="../../css/styles.css">
    <title>Rock Paper Scissors</title>
    <style>
        @font-face {
        font-family: "Minecraft";
        src: url("../../assets/fonts/Minecraft.ttf") format("truetype");
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <a href="../../index.html"
        ><div class="logo">
          <img src="../../assets/images/logo.png" alt="logo" />
          <span>ASOBI</span>
        </div></a
      >
      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <ul class="nav-links" id="navLinks">
        <li><a href="../../games.html">Games</a></li>
        <li><a href="../../explore.html">Explore</a></li>
        <li><a href="../../about.html">About Us</a></li>
      </ul>
    </nav>
    <h1 class="page-title">Rock Paper Scissors</h1>

    <div class="container">
      <div class="weapon-box">
        <h3>Select your Weapon</h3>
        <div class="weapons">
          <div class="Rock">
            <img src="../../assets/images/RPS/rock.png" alt="Rock" />
          </div>
          <div class="Paper">
            <img src="../../assets/images/RPS/paper.png" alt="Paper" />
          </div>
          <div class="Scissors">
            <img src="../../assets/images/RPS/scissors.png" alt="Scissors" />
          </div>
        </div>
      </div>

      <div class="player-choices">
        <h3>Player <span>V/S</span> Computer</h3>
        <div class="player-choice">
          <img src="../../assets/images/RPS/rock.png" alt="" />
        </div>
        <div class="computer-choice">
          <img src="../../assets/images/RPS/rock.png" alt="" />
        </div>
      </div>

      <div class="result-box">
        <h3>Congrats, You Won! &#x1F389;</h3>
        <button class="play-again">&#x21BB; Play Again</button>
      </div>

      <div class="score-box">
        <div class="won">
          <h3>Won: <span>0</span></h3>
        </div>
        <div class="lost">
          <h3>Lost: <span>0</span></h3>
        </div>
        <div class="draw">
          <h3>Draw: <span>0</span></h3>
        </div>
      </div>
    </div>
    <footer class="footer">
        <p class="footer-copyright">
            Copyright © 2026 <strong>ASOBI</strong>. All rights reserved.
        </p>
        <p class="footer-text">
            Love for the mini games.
        </p>
    </footer>
    <script src="rock_paper_scissors.js"></script>
    <script src="../../js/main.js"></script>
  </body>
</html>
