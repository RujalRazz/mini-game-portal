<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <link rel="stylesheet" href="snake_game.css" />
  <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
    <nav class="navbar">
      <a href="../../index.html"
        ><div class="logo">
          <img src="../../assets/images/logo.png" alt="logo" />
          <span>ASOBI</span>
        </div></a
      >
      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <ul class="nav-links" id="navLinks">
        <li><a href="../../games.html">Games</a></li>
        <li><a href="../../explore.html">Explore</a></li>
        <li><a href="../../about.html">About Us</a></li>
      </ul>
    </nav>
  <main class="game-page">
    <h1 class="game-title">Snake Game</h1>

    <section class="game-info">
      <div class="info-box">
        <span class="label">Score</span>
        <span id="score">0</span>
      </div>

      <div class="info-box">
        <span class="label">Level</span>
        <span id="level">1</span>
      </div>
    </section>

    <section class="board-wrapper">
      <div id="game-board"></div>

      <div id="game-overlay" class="hidden">
        <div class="overlay-box">
          <h2 id="overlay-title">Paused</h2>
          <p>Score: <span id="overlay-score">0</span></p>
          <p>Level: <span id="overlay-level">1</span></p>
          <p id="overlay-message"></p>
          <button id="replay-btn">Replay</button>
          <button id="exit-btn">Exit</button>
          <button id="resume-btn" class="hidden">Resume</button>
        </div>
      </div>
    </section>

    <p class="controls-text">
      Arrow Keys to move • Space to pause • Replay button to restart
    </p>
  </main>
  <footer class="footer">
        <p class="footer-copyright">
            Copyright © 2026 <strong>ASOBI</strong>. All rights reserved.
        </p>
        <p class="footer-text">
            Love for the mini games.
        </p>
    </footer>
  <script src="snake_game.js"></script>
  <script src="../../js/main.js"></script>
</body>
</html>
