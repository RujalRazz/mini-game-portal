<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to ASOBI</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <style>
      
      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Minecraft";
      }
      .welcome {
        font-size: clamp(2.5rem, 8vw, 10rem);
      }
      .welcome span {
        display: inline-block;
        color: #c084fc;
        animation: bounce 1s infinite;
      }
      .welcome span:nth-child(1) {
        animation-delay: 0s;
      }
      .welcome span:nth-child(2) {
        animation-delay: 0.1s;
      }
      .welcome span:nth-child(3) {
        animation-delay: 0.2s;
      }
      .welcome span:nth-child(4) {
        animation-delay: 0.3s;
      }
      .welcome span:nth-child(5) {
        animation-delay: 0.4s;
      }
      .welcome span:nth-child(6) {
        animation-delay: 0.5s;
      }
      .welcome span:nth-child(7) {
        animation-delay: 0.6s;
      }

      .play-btn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        font-size: 20px;
        padding: 15px 30px;
        background: #9333ea;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        box-shadow: 0 0 10px #9333ea;
        transition: 0.3s;
        font-family: 'Minecraft';
      }

      .play-btn:hover {
        background: #a855f7;
        transform: scale(1.1);
      }
      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-20px);
        }
      }
    </style>
  </head>
  <body>
    <h1 class="welcome">
      <span>W</span>
      <span>E</span>
      <span>L</span>
      <span>C</span>
      <span>O</span>
      <span>M</span>
      <span>E</span>
    </h1>
    <a href="/games.html"><button class="play-btn">PLAY</button></a>
  </body>
</html>
