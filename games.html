<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enjoy Games</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <style>
      @font-face {
        font-family: "Minecraft";
        src: url("./assets/fonts/Minecraft.ttf") format("truetype");
      }
      body {
        font-family: "Minecraft";
      }
      
      .games-section {
        padding: 80px 0;
        text-align: center;
      }

      .section-title {
        color: #c084fc;
        margin-bottom: 40px;
      }
      .games-section {
        padding: 80px 20px;
        text-align: center;
      }

      .section-title {
        font-size: 36px;
        font-weight: bold;
        color: #c084fc;
        margin-bottom: 60px;
        text-shadow: 0 0 20px rgba(147, 51, 234, 0.5);
      }

      .carousel-container {
        position: relative;
        max-width: 1200px;
        margin: auto;
        overflow: visible;
        padding: 40px 80px;
      }

      .carousel {
        display: flex;
        gap: 30px;
        justify-content: center;
        align-items: center;
      }

      .card {
        background: #140022;
        border: 1px solid #9333ea;
        border-radius: 15px;
        width: 280px;
        padding: 20px;
        color: white;
        box-shadow: 0 0 15px rgba(147, 51, 234, 0.2);
        transform: scale(0.8);
        opacity: 0.4;
        filter: blur(2px);
        transition: all 0.5s ease;
        flex-shrink: 0;
      }

      .card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 10px;
        background: linear-gradient(135deg, #9333ea 0%, #c084fc 100%);
      }

      .card h3 {
        margin-top: 15px;
        color: #c084fc;
        font-size: 20px;
        font-family: "Minecraft";
      }

      .card p {
        font-size: 14px;
        color: #d8b4fe;
        margin-top: 10px;
        line-height: 1.5;
        font-family: "Minecraft";
      }
      .play {
        display: inline-block;
        margin-top: 15px;
        padding: 10px 25px;
        background: linear-gradient(135deg, #9333ea 0%, #c084fc 100%);
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        transition: all 0.3s ease;
        text-align: center;
      }
      .play:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(147, 51, 234, 0.6);
      }
      .card:not(.active) .play {
        opacity: 0;
        pointer-events: none;
      }
      .card.active .play {
        opacity: 1;
      }
      .card.active {
        transform: scale(1.1);
        opacity: 1;
        filter: blur(0px);
        box-shadow:
          0 0 40px rgba(147, 51, 234, 0.9),
          0 0 80px rgba(147, 51, 234, 0.6);
        border-color: #c084fc;
        border-width: 2px;
        z-index: 5;
      }

      .card:hover:not(.active) {
        opacity: 0.6;
        filter: blur(1px);
        cursor: not-allowed;
      }

      .arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: #9333ea;
        border: none;
        color: white;
        font-size: 25px;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        cursor: pointer;
        z-index: 10;
        transition: all 0.3s ease;
      }

      .arrow:hover {
        background: #a855f7;
        transform: translateY(-50%) scale(1.1);
      }

      .arrow:disabled {
        opacity: 0;
        cursor: not-allowed;
        pointer-events: none;
      }

      .left {
        left: 10px;
      }

      .right {
        right: 10px;
      }

      @media (max-width: 768px) {
        .carousel-container {
          padding: 0 60px;
        }

        .card {
          min-width: 220px;
        }

        .section-title {
          font-size: 28px;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <a href="./games.html"
        ><div class="logo">
          <img src="./assets/images/logo.png" alt="logo" />
          <span>ASOBI</span>
        </div></a
      >
      <ul class="nav-links">
        <li><a href="./games.html">Games</a></li>
        <li><a href="#">Explore</a></li>
        <li><a href="./about.html">About Us</a></li>
      </ul>
    </nav>
    <section class="games-section">
      <h2 class="section-title">FEATURED GAMES</h2>
      <div class="carousel-container">
        <button class="arrow left">&#10094;</button>
        <div class="carousel" id="gameCarousel"></div>
        <button class="arrow right">&#10095;</button>
      </div>
    </section>
    <script src="./js/gamesCard.js"></script>
  </body>
</html>
