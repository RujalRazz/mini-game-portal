<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enjoy Games</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <style>
      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 40px;
        background: rgba(10, 0, 20, 0.9);
        border-bottom: 1px solid #9333ea;
        position: sticky;
        top: 0;
      }
      logo {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo img {
        width: 35px;
      }
      .logo span {
        font-size: 18px;
        color: #c084fc;
      }
      .nav-links {
        list-style: none;
        display: flex;
        gap: 40px;
      }

      .nav-links a {
        text-decoration: none;
        color: white;
        font-size: 20px;
        transition: 0.3s;
      }
      .nav-links a:hover {
        color: #c084fc;
        text-shadow: 0 0 8px #9333ea;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <a href="./games.html"><div class="logo">
        <img src="./assets/images/logo.png" alt="logo" />
        <span>ASOBI</span>
      </div></a>
      <ul class="nav-links">
        <li><a href="./games.html">Games</a></li>
        <li><a href="#">Explore</a></li>
        <li><a href="#">About Us</a></li>
      </ul>
    </nav>
  </body>
</html>
